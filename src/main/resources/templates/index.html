<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ようこそ - くらし救急箱</title>
	<style>
		body,
		html {
			margin: 0;
			padding: 0;
			height: 100%;
			width: 100%;
			overflow: hidden;
			background-color: #f0fbfc;
		}

		.fullscreen-bg {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
		}

		.welcome-btn {
			margin-top: 20px;
			padding: 20px 80px;
			font-size: 28px;
			font-weight: bold;
			color: white;
			background: linear-gradient(135deg, #00bcd4, #00acc1);
			text-decoration: none;
			border-radius: 50px;
			box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
			transition: 0.3s;
			cursor: pointer;
			border: none;
		}

		.welcome-btn:hover {
			transform: scale(1.1);
		}

		.admin-link {
			position: absolute;
			bottom: 10px;
			right: 10px;
			width: 50px;
			height: 50px;
			opacity: 0.1;
		}
	</style>
</head>

<body>
	<div class="fullscreen-bg">
		<img th:src="@{/images/kokoro.png}" alt="kokoro" id="charaImg"
			style="max-height: 70vh; max-width: 90%; transition: 0.2s;">
		<a th:href="@{/nfc?role=user}" class="welcome-btn" onclick="return playDoubleWink(event, this)">ようこそ</a>
		<a th:href="@{/nfc?role=admin}" class="admin-link"></a>
	</div>
	<!-- index.html の該当する <script> 部分を以下に書き換えてください -->
	<script th:inline="javascript">
		function playDoubleWink(event, element) {
			event.preventDefault();
			var img = document.getElementById('charaImg');

			// ⭕ エディタにエラーを出さない最も安全なThymeleafインラインの書き方
			var normalImg = /*[[@{/images/kokoro.png}]]*/ '/images/kokoro.png';
			var winkImg = /*[[@{/images/wink.png}]]*/ '/images/wink.png';

			img.src = winkImg;
			setTimeout(function () {
				img.src = normalImg;
				setTimeout(function () {
					window.location.href = element.href;
				}, 300);
			}, 400);
			return false;
		}
	</script>
</body>

</html>
