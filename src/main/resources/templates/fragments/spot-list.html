<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<div th:fragment="spotListSection">
    <div class="box">
        <h2>📋 登録済みデータ一覧</h2>
        
        <script>
            function showConfirm(btn) {
                btn.style.display = 'none';
                btn.nextElementSibling.style.display = 'flex';
            }
            function cancelDelete(btn) {
                const box = btn.parentElement;
                box.style.display = 'none';
                box.previousElementSibling.style.display = 'inline-block';
            }

            // ★ここを修正：作者名などを確実に表示するロジック
            function updateAdminSongInfo() {
                const select = document.getElementById('adminSongSelect');
                const infoArea = document.getElementById('adminSongInfo');
                const option = select.options[select.selectedIndex];
                
                if (option.value) {
                    // IDをセット
                    document.getElementById('adminTargetMusicId').value = option.value;
                    // 文字をセット（data-属性から取得）
                    document.getElementById('adminDisplayTitle').innerText = option.getAttribute('data-title') || "未設定";
                    document.getElementById('adminDisplayAuthor').innerText = option.getAttribute('data-author') || "不明";
                    document.getElementById('adminDisplayFile').innerText = option.getAttribute('data-file') || "なし";
                    
                    // エリアを表示
                    infoArea.style.display = 'block';
                }
            }

            function confirmAdminMusicDelete() {
                const id = document.getElementById('adminTargetMusicId').value;
                if (!id) return alert("曲を選んでね！");
                if (confirm("この曲の設定を削除してもいいかな？")) {
                    document.getElementById('adminMusicDeleteForm').submit();
                }
            }
        </script>

        <th:block th:each="cat : ${ {'music_config', 'sos', 'hero', 'private'} }">
            <h3 th:style="${cat == 'music_config' ? 'color:#6b46c1; border-bottom:2px solid #805ad5;' : 
                           (cat == 'sos' ? 'color:#d32f2f; border-bottom:2px solid #ff4d4d;' : 
                           (cat == 'hero' ? 'color:#00796b; border-bottom:2px solid #00acc1;' : 
                                            'color:#455a64; border-bottom:2px solid #90a4ae;'))} + ' padding-bottom:5px; margin-top:30px;'">
                <span th:if="${cat == 'music_config'}">🎵 現在の音楽プレイヤー設定</span>
                <span th:if="${cat == 'sos'}">🚨 SOS（助けが必要な場所）</span>
                <span th:if="${cat == 'hero'}">🦸 HERO（助けに行く拠点）</span>
                <span th:if="${cat == 'private'}">👤 個人タグ（住所非公開）</span>
            </h3>

            <!-- 【音楽の場合】 -->
            <div th:if="${cat == 'music_config'}" class="info-card" style="padding: 15px; background: #f8f5ff; border-radius: 10px; border: 1px solid #d6bcfa;">
                <div style="display: flex; gap: 10px; align-items: center;">
					<select id="adminSongSelect" onchange="updateAdminSongInfo()" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
					    <option value="" disabled selected>👇 登録済みの曲を確認・削除</option>
					    <option th:each="s : ${spotList}" th:if="${s.category == 'music_config'}" 
					            th:value="${s.id}" 
					            th:data-title="${s.name}" 
					            th:data-author="${s.ownerName}" 
					            th:data-file="${s.nfcAddress}"
					            th:text="'🎵 ' + ${s.name} + ' （👤 ' + ${s.ownerName} + '）'"> 
					            <!-- ↑ ここで作者名も一緒に表示するようにしました！ -->
					    </option>
					</select>
                    <form th:action="@{/admin/delete-spot}" method="post" id="adminMusicDeleteForm" style="margin: 0;">
                        <input type="hidden" name="id" id="adminTargetMusicId">
                        <button type="button" onclick="confirmAdminMusicDelete()" style="background: #805ad5; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">削除</button>
                    </form>
                </div>
                <!-- ★表示エリア：ここが重要 -->
                <div id="adminSongInfo" style="display: none; margin-top: 10px; font-size: 0.85em; color: #444; background: white; padding: 8px; border-radius: 5px; border: 1px dashed #d6bcfa;">
                    📌 <span id="adminDisplayTitle" style="font-weight:bold;"></span> <br>
                    👤 作者: <span id="adminDisplayAuthor" style="color: #6b46c1; font-weight: bold;"></span> <br>
                    📁 ファイル: <span id="adminDisplayFile" style="color: #666;"></span>
                </div>
            </div>

            <!-- 【音楽以外の場合】 -->
            <div th:each="s : ${spotList}" th:if="${s.category == cat and cat != 'music_config'}" class="spot-item" 
                 style="border-bottom:1px solid #eee; padding:12px 0; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <strong th:text="${s.name}"></strong><br>
                    <small th:if="${s.address != null}">📍[[${s.address}]] [[${s.buildingName}]]</small>
                </div>
                <!-- ...削除ボタンエリアは以前と同じ... -->
                <div class="delete-area" style="display: flex; align-items: center; gap: 10px;">
                    <button type="button" onclick="showConfirm(this)" class="btn-delete">削除</button>
                    <div class="confirm-box" style="display: none; align-items: center; gap: 8px; background: #fff1f1; padding: 2px 8px; border-radius: 5px; border: 1px solid #ffcaca;">
                        <small style="color: red; font-weight: bold;">削除？</small>
                        <form th:action="@{/admin/delete-spot}" method="post" style="margin: 0;">
                            <input type="hidden" name="id" th:value="${s.id}">
                            <button type="submit" style="background:#ff4d4d; color:white; border:none; padding:4px 10px; border-radius:3px; cursor:pointer;">はい</button>
                        </form>
                        <button type="button" onclick="cancelDelete(this)" style="background:#ddd; border:none; padding:4px 10px; border-radius:3px; cursor:pointer;">いいえ</button>
                    </div>
                </div>
            </div>
        </th:block>
    </div>
</div>
</html>
