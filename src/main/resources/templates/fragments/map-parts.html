<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<body>

    <!-- 1. メイン地図表示エリア -->
    <div th:fragment="mapSection" class="info-card">
        <h3>📍 近所の地図</h3>
        <div id="map"></div>
    </div>

    <!-- 2. SOS/HERO詳細リストエリア -->
    <div th:fragment="listSection">
        
        <!-- SOSセクション: 助けが必要な場所 -->
        <h3 style="color: #ff5252; border-bottom: 2px solid #ffebee; padding-bottom: 5px; margin-top: 25px;">
            🆘 助けが必要な場所 (SOS)
        </h3>
        <div style="display: grid; gap: 15px; margin-bottom: 30px;">
            <div th:each="spot : ${spotList}" th:if="${spot.category == 'sos'}" class="info-card interactive-item">
                <div style="display: flex; align-items: center; margin-bottom: 10px;">
                    <div style="margin-right: 15px;">
                        <img th:src="@{/images/sos.png}" style="width: 60px; height: 60px; border-radius: 10px;">
                    </div>
                    <div style="flex-grow: 1;">
                        <strong th:text="${spot.name}" style="font-size: 1.1em;"></strong><br>
                        <small style="color: #888;">
                            📍[[${spot.address}]] <span th:text="${spot.buildingName}"></span>
                        </small>
                        <p th:text="${spot.description}" style="color: #666; margin: 5px 0; font-size: 0.9em;"></p>
                    </div>
                </div>

                <!-- 座標がある場合のみGoogleマップを表示 -->
                <div th:if="${spot.lat != 0}" style="margin: 10px 0; border-radius: 8px; overflow: hidden; border: 1px solid #eee;">
                    <iframe 
					th:src="'https://www.google.com/maps?q=' + ${spot.lat} + ',' + ${spot.lng} + '&output=embed&hl=ja'"
                        width="100%" height="240" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>

                <a th:href="'https://www.google.com/maps/dir/?api=1&destination=' + ${spot.lat} + ',' + ${spot.lng}" 
                   target="_blank" class="google-nav-btn" 
                   style="display: block; text-align: center; background: #00acc1; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold;">
                   案内開始
                </a>
            </div>
        </div>

        <!-- HEROセクション: 救済・支援拠点 -->
        <h3 style="color: #00acc1; border-bottom: 2px solid #e0f7fa; padding-bottom: 5px;">
            🦸 救済・支援拠点 (HERO)
        </h3>
        <div style="display: grid; gap: 15px;">
            <div th:each="spot : ${spotList}" th:if="${spot.category == 'hero'}" class="info-card interactive-item">
                <div style="display: flex; align-items: center; margin-bottom: 10px;">
                    <div style="margin-right: 15px;">
                        <img th:src="@{/images/hero.png}" style="width: 60px; height: 60px; border-radius: 10px;">
                    </div>
                    <div style="flex-grow: 1;">
                        <strong th:text="${spot.name}" style="font-size: 1.1em;"></strong><br>
                        <small style="color: #888;">
                            📍[[${spot.address}]] <span th:text="${spot.buildingName}"></span>
                        </small>
                        <p th:text="${spot.description}" style="color: #666; margin: 5px 0; font-size: 0.9em;"></p>
                    </div>
                </div>

                <div th:if="${spot.lat != 0}" style="margin: 10px 0; border-radius: 8px; overflow: hidden; border: 1px solid #eee;">
                    <iframe 
					th:src="'https://www.google.com/maps?q=' + ${spot.lat} + ',' + ${spot.lng} + '&output=embed&hl=ja'"

                        width="100%" height="240" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>

                <a th:href="'https://www.google.com/maps/dir/?api=1&destination=' + ${spot.lat} + ',' + ${spot.lng}" 
                   target="_blank" class="google-nav-btn" 
                   style="display: block; text-align: center; background: #00acc1; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold;">
                   案内開始
                </a>
            </div>
        </div>
    </div>
</body>
</html>
